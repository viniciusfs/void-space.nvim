# Void Space - Kitty color scheme
# https://github.com/viniciusfs/void-space.nvim
#
# Usage: include this file in your kitty.conf:
#   include void-space-kitty.conf

# Primary
background            #1a1f28
foreground            #99a7be

# Cursor
cursor                #99a7be
cursor_text_color     #1a1f28

# Selection
selection_background  #323c4d
selection_foreground  #99a7be

# URL underline
url_color             #4ab5c4

# Window borders
active_border_color   #618bc2
inactive_border_color #323c4d
bell_border_color     #c68b8f

# Tab bar
tab_bar_background        #141820
active_tab_foreground     #99a7be
active_tab_background     #232936
inactive_tab_foreground   #5f7090
inactive_tab_background   #1a1f28

# Normal colors (0-7)
color0   #1a1f28
color1   #c68b8f
color2   #8fb98c
color3   #b39b64
color4   #618bc2
color5   #9b88d0
color6   #4ab5c4
color7   #5f7090

# Bright colors (8-15)
color8   #232936
color9   #DCA8AC
color10  #A9D2A6
color11  #d5ad75
color12  #7FA5D7
color13  #cc7dd0
color14  #69CAD8
color15  #99a7be
