# Void Space - tmux color scheme
# https://github.com/viniciusfs/void-space.nvim
#
# Usage: source this file from your tmux.conf:
#   source-file ~/.config/tmux/void-space-tmux.conf

# Status bar
set -g status-style                 "bg=#1a1f28,fg=#99a7be"
set -g status-left-style            "bg=#618bc2,fg=#1a1f28,bold"
set -g status-right-style           "bg=#1a1f28,fg=#5f7090"

# Window tabs
set -g window-status-style          "bg=#1a1f28,fg=#5f7090"
set -g window-status-current-style  "bg=#232936,fg=#99a7be,bold"
set -g window-status-activity-style "bg=#1a1f28,fg=#c68b8f"
set -g window-status-bell-style     "bg=#1a1f28,fg=#ba8873,bold"

# Pane borders
set -g pane-border-style            "fg=#323c4d"
set -g pane-active-border-style     "fg=#618bc2"

# Command / message line
set -g message-style                "bg=#232936,fg=#99a7be"
set -g message-command-style        "bg=#232936,fg=#b39b64"

# Copy mode / selection
set -g mode-style                   "bg=#323c4d,fg=#99a7be"

# Clock
set -g clock-mode-colour            "#618bc2"

# 256-colour terminal colors (ANSI 0-15)
# These are picked up by applications running inside tmux.
set -g terminal-overrides           ",*256col*:Tc"

# normal
set -ga terminal-overrides          ",*:colors=256"

# Set TERM so inner applications see full colour support
# (uncomment if you are not setting this in your shell profile)
# set -g default-terminal "tmux-256color"
